<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Reset password — AvatarPlatform</title>
  <link rel="stylesheet" href="/css/app.css" />
</head>
<body>
  <div style="min-height:100vh;display:grid;place-items:center;padding:24px">
    <div class="card" style="width:100%;max-width:400px">
      <a class="brand" href="/" style="margin-bottom:24px;justify-content:center">
        <span class="brand-mark">A</span>
        <span>AvatarPlatform</span>
      </a>
      <h1 style="font-size:22px;margin:0 0 4px;text-align:center">Reset your password</h1>
      <p class="muted text-sm text-center" style="margin:0 0 24px">Enter your email and we'll send you a reset link</p>

      <div id="sent-msg" style="display:none;text-align:center">
        <div style="font-size:36px;margin-bottom:16px">📬</div>
        <p style="margin:0 0 8px;font-weight:600">Check your email</p>
        <p class="muted text-sm" style="margin:0 0 24px">If that address is registered, a reset link is on its way. Check your spam folder if it doesn't arrive within a minute.</p>
        <a href="/login" class="btn btn-primary" style="width:100%;justify-content:center">Back to log in</a>
      </div>

      <form id="forgot-form" class="col gap-md">
        <div class="field">
          <label>Email address</label>
          <input class="input" type="email" id="email" required autofocus autocomplete="email" />
        </div>
        <div id="error" class="text-sm" style="color:#fca5a5;display:none"></div>
        <button class="btn btn-primary btn-lg" type="submit" id="submit">Send reset link</button>
      </form>

      <p class="muted text-sm text-center" style="margin-top:20px">
        <a href="/login">← Back to log in</a>
      </p>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script>
  if (Auth.loggedIn()) location.href = '/dashboard';

  document.getElementById('forgot-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submit');
    const err = document.getElementById('error');
    err.style.display = 'none';
    btn.disabled = true; btn.textContent = 'Sending…';
    try {
      await API.forgotPassword(document.getElementById('email').value.trim());
      document.getElementById('forgot-form').style.display = 'none';
      document.getElementById('sent-msg').style.display = 'block';
    } catch (e2) {
      err.textContent = e2.message;
      err.style.display = 'block';
      btn.disabled = false; btn.textContent = 'Send reset link';
    }
  });
  </script>
</body>
</html>
