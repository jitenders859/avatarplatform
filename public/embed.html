<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Chat</title>
  <link rel="stylesheet" href="/css/embed.css" />
  <script src="https://unpkg.com/@rive-app/canvas@2.21.0/rive.js"></script>
  <script src="/lipsync-sdk.js"></script>
</head>
<body>
  <!--
    LAYOUT
    ───────────────────────────────────────────────────
    .widget-root           positioned shell (floating modes only; inline mode is full-bleed)
      .launcher            FAB visible when minimized; Rive avatar inside
      .panel               chat panel
        .header            name + status + minimize (no avatar here)
        .body              messages list (scrollable)
        .avatar-row        Rive avatar stage, sits above composer in flex flow
        .composer          mic + textarea + send
        .branding

    The Rive canvas is a single element that shuttles between the launcher
    slot (when minimized) and the avatar-row slot (when open), driven by
    openPanel() / closePanel(). No duplicate Rive instances needed.
  -->

  <div class="widget-root" id="root" data-position="bottom-right" data-state="loading" hidden>
    <!-- Launcher (visible when minimized) -->
    <button class="launcher" id="launcher" aria-label="Open chat" type="button">
      <div class="launcher-avatar-slot" id="launcher-avatar-slot"></div>
      <span class="launcher-fallback" id="launcher-fallback">💬</span>
      <span class="launcher-pulse" aria-hidden="true"></span>
      <span class="launcher-badge" id="launcher-badge" hidden>1</span>
    </button>

    <!-- Panel (visible when open) -->
    <section class="panel" id="panel" role="dialog" aria-label="Chat with assistant">
      <header class="header" id="header">
        <div class="header-text">
          <div class="header-name" id="bot-name">Assistant</div>
          <div class="header-status">
            <span class="status-dot" id="status-dot"></span>
            <span id="status-text">Connecting…</span>
            <span id="capture-pill" style="display:none;margin-left:8px;font-size:10px;background:rgba(255,255,255,.15);border-radius:10px;padding:2px 7px;letter-spacing:.02em"></span>
          </div>
        </div>
        <button class="icon-btn" id="minimize-btn" title="Minimize" aria-label="Minimize">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M5 12h14"/></svg>
        </button>
      </header>

      <div class="body" id="messages" role="log" aria-live="polite"></div>

      <!-- Avatar row: large Rive character above the composer -->
      <div class="avatar-row" id="avatar-row">
        <div class="avatar-stage" id="avatar-canvas-slot">
          <!-- Canvas reparented here by JS once SDK builds it -->
        </div>
      </div>

      <div class="composer">
        <button class="icon-btn mic-btn" id="mic-btn" title="Hold to speak" aria-label="Microphone">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v6a3 3 0 1 0 6 0V5a3 3 0 0 0-3-3z"/><path d="M19 11a7 7 0 0 1-14 0"/><line x1="12" y1="18" x2="12" y2="22"/></svg>
        </button>
        <textarea id="text-input" rows="1" placeholder="Type a message…" aria-label="Message"></textarea>
        <button class="send-btn" id="send-btn" title="Send" aria-label="Send" type="button">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
        </button>
      </div>

      <!-- Collapsible "Your details" panel -->
      <div id="details-panel" style="display:none;border-top:1px solid rgba(255,255,255,.12);padding:8px 12px 4px;background:rgba(0,0,0,.15)">
        <div style="display:flex;align-items:center;justify-content:space-between;cursor:pointer;padding:2px 0 6px" onclick="toggleDetailsPanel()">
          <span style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;opacity:.7">Your details</span>
          <span id="details-chevron" style="font-size:10px;opacity:.6">▲</span>
        </div>
        <div id="details-body" style="display:flex;flex-direction:column;gap:4px;padding-bottom:6px"></div>
      </div>
      <div class="branding" id="branding">Powered by AvatarPlatform</div>
    </section>
  </div>

  <!-- Off-screen host the SDK uses to build its canvas before we reparent it -->
  <div id="sdk-host" style="position:fixed;left:-99999px;top:-99999px;width:300px;height:300px;"></div>

  <!-- Loading skeleton -->
  <div class="boot-overlay" id="boot-overlay">
    <div class="boot-skeleton">
      <div class="skel-circle pulse"></div>
      <div class="skel-lines">
        <div class="skel-line pulse" style="width:60%"></div>
        <div class="skel-line pulse" style="width:80%"></div>
      </div>
    </div>
  </div>

  <script>
  /* eslint-disable no-undef */
  // ── Boot ─────────────────────────────────────────────────────
  const path = location.pathname;
  const m = path.match(/\/e\/([a-zA-Z0-9_-]+)/);
  const publicId = m ? m[1] : new URLSearchParams(location.search).get('bot');
  if (!publicId) { showFatal('Missing chatbot ID'); }

  const urlMode = new URLSearchParams(location.search).get('mode');

  let avatar = null;
  let config = null;
  let sessionId = null;
  let pendingSources = null;
  let sessionCapture = {};
  let captureFields = [];
  let saveLeadTimer = null;
  let currentBotMsgEl = null;
  let currentUserMsgEl = null;
  let lastUserFinal = '';
  let unreadCount = 0;
  let panelOpen = true;
  let avatarCanvas = null;   // single Rive canvas element shuttled between slots

  const AVATAR_SIZES = { small: 80, medium: 120, large: 160, xlarge: 200 };

  const root              = document.getElementById('root');
  const panel             = document.getElementById('panel');
  const launcher          = document.getElementById('launcher');
  const launcherBadge     = document.getElementById('launcher-badge');
  const launcherAvatarSlot= document.getElementById('launcher-avatar-slot');
  const launcherFallback  = document.getElementById('launcher-fallback');
  const messagesEl        = document.getElementById('messages');
  const statusDot         = document.getElementById('status-dot');
  const statusText        = document.getElementById('status-text');
  const sendBtn           = document.getElementById('send-btn');
  const micBtn            = document.getElementById('mic-btn');
  const textInput         = document.getElementById('text-input');
  const minimizeBtn       = document.getElementById('minimize-btn');
  const bootOverlay       = document.getElementById('boot-overlay');
  const branding          = document.getElementById('branding');
  const avatarRow         = document.getElementById('avatar-row');
  const avatarCanvasSlot  = document.getElementById('avatar-canvas-slot');

  // ── 1. Fetch config ─────────────────────────────────────────
  async function boot() {
    try {
      const res = await fetch(`/embed/${publicId}/config`);
      if (!res.ok) throw new Error(`Failed to load chatbot (${res.status})`);
      config = await res.json();
    } catch (e) { showFatal(e.message); return; }

    document.getElementById('bot-name').textContent = config.project.name;
    document.title = config.project.name;

    if (config.project.themeColor) {
      document.documentElement.style.setProperty('--accent', config.project.themeColor);
    }

    const position = urlMode === 'inline' ? 'inline' : (config.project.widgetPosition || 'bottom-right');
    root.dataset.position = position;
    if (position === 'inline') document.body.classList.add('mode-inline');

    applyDirection(config.project.textDirection || 'auto');
    if (!config.project.showBranding) branding.style.display = 'none';

    // Avatar placement settings
    const avatarSize = config.project.avatarSize || 'large';
    const avatarSizePx = AVATAR_SIZES[avatarSize] || 160;
    const avatarPos = config.project.avatarPosition || 'right';
    const compactMobile = config.project.avatarCompactOnMobile !== false;

    document.documentElement.style.setProperty('--avatar-size', avatarSizePx + 'px');
    panel.dataset.avatarPos = avatarPos;
    if (compactMobile) panel.dataset.compactMobile = '1';

    // Apply launcher size: make launcher larger when showing avatar
    if (config.project.showAvatarInLauncher !== false) {
      const launcherSz = Math.max(64, Math.min(avatarSizePx, 88));
      document.documentElement.style.setProperty('--launcher-size', launcherSz + 'px');
      launcher.classList.add('has-avatar');
    }

    if (!config.apiKey) { showFatal('This chatbot is not yet configured (no API key).'); return; }

    initSDK();
  }

  function applyDirection(setting) {
    let dir = setting;
    if (setting === 'auto') {
      dir = detectDirection(config.project.welcomeMessage || '') || 'ltr';
    }
    document.documentElement.dir = dir;
    document.documentElement.lang = dir === 'rtl' ? 'ar' : 'en';
  }

  const RTL_REGEX = /[֐-׿؀-ۿ܀-ݏހ-޿߀-߿ﭐ-﷿ﹰ-﻿]/;
  function detectDirection(text) {
    if (!text) return null;
    return RTL_REGEX.test(text) ? 'rtl' : 'ltr';
  }

  // ── 2. SDK init ─────────────────────────────────────────────
  function initSDK() {
    const GREET_TRIGGER = '__GREET_USER_NOW__';
    const welcomeMessage = (config.project.welcomeMessage || '').trim();

    captureFields = config.captureFields || [];
    const baseSystemPrompt = (config.project.systemPrompt || '') + buildCaptureInstructions(captureFields);
    const systemPromptWithGreeting = welcomeMessage
      ? `${baseSystemPrompt}

GREETING INSTRUCTION: When (and only when) you receive the exact message "${GREET_TRIGGER}", respond by speaking this greeting verbatim and nothing else: "${welcomeMessage}". Do not acknowledge the trigger token, do not add any other words. For all other messages, ignore this instruction and respond normally.`
      : baseSystemPrompt;

    avatar = new LipsyncAvatar({
      container:    '#sdk-host',
      riveSrc:      config.character.rivePath,
      apiKey:       config.apiKey,
      model:        config.model,
      voice:        config.project.voice,
      systemPrompt: systemPromptWithGreeting,

      showVoiceSelect: false, showTranscript: false,
      showTextInput: false,   showBands: false,
      width: 300, height: 300,

      onConnected: () => {
        statusDot.className = 'status-dot connected';
        statusText.textContent = 'Online';
      },
      onDisconnected: () => {
        statusDot.className = 'status-dot';
        statusText.textContent = 'Offline';
      },
      onError: (msg) => { console.warn('[avatar]', msg); },
      onTranscript: (role, text) => {
        if (role === 'model') handleBotChunk(text);
        else if (role === 'user') handleUserChunk(text);
      },
    });

    // Reparent canvas once SDK builds it
    waitForCanvas(canvas => {
      avatarCanvas = canvas;
      Object.assign(canvas.style, { width: '100%', height: '100%', display: 'block', borderRadius: '12px' });
      // Initial placement: avatar-row slot (panel will be open or we'll move it on close)
      avatarCanvasSlot.appendChild(canvas);
      launcherFallback.style.display = 'none';
    });

    const startOpen = !!config.project.widgetStartOpen;

    if (welcomeMessage) {
      avatar.connect();
      waitForConnected(() => {
        currentBotMsgEl = addMessage('bot', '', { welcome: true });
        avatar.sendText(GREET_TRIGGER);
        finishBoot(startOpen);
      });
    } else {
      finishBoot(startOpen);
    }
  }

  function waitForCanvas(cb, attempts = 60) {
    const host = document.getElementById('sdk-host');
    const canvas = host && host.querySelector('canvas');
    if (canvas) return cb(canvas);
    if (attempts <= 0) return;
    setTimeout(() => waitForCanvas(cb, attempts - 1), 80);
  }

  function waitForConnected(cb, attempts = 80) {
    if (statusDot.classList.contains('connected')) return cb();
    if (attempts <= 0) { console.warn('[avatar] connect timeout'); return cb(); }
    setTimeout(() => waitForConnected(cb, attempts - 1), 100);
  }

  function finishBoot(startOpen) {
    bootOverlay.classList.add('fade-out');
    setTimeout(() => bootOverlay.remove(), 300);
    root.hidden = false;
    root.dataset.state = 'ready';
    if (root.dataset.position === 'inline' || startOpen) {
      openPanel();
    } else {
      closePanel(true);
    }
    setupDrag();
    notifyParent({ type: 'ready' });
  }

  // ── Drag-to-reposition ─────────────────────────────────────────
  function setupDrag() {
    if (root.dataset.position === 'inline') return;
    if (window.matchMedia('(pointer: coarse)').matches) return;

    root.classList.add('draggable');

    const headerEl = document.getElementById('header');
    const minBtn   = document.getElementById('minimize-btn');

    headerEl.addEventListener('mousedown', (e) => {
      if (e.button !== 0) return;
      if (minBtn.contains(e.target)) return;
      headerEl.style.cursor = 'grabbing';
      notifyParent({ type: 'drag-start' });
    });
  }

  // ── 3. Sending messages ─────────────────────────────────────
  async function sendMessage(text) {
    text = (text || '').trim();
    if (!text) return;
    addMessage('user', text);
    textInput.value = '';
    textInput.style.height = 'auto';
    sendBtn.disabled = true;

    let retrieved = { chunks: [], sources: [] };
    try {
      statusText.textContent = 'Thinking…';
      const res = await fetch(`/embed/${publicId}/retrieve`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query: text, k: 5 }),
      });
      if (res.ok) retrieved = await res.json();
      else if (res.status === 429) {
        addMessage('bot', '⚠️ Slow down a bit — too many messages in a short time.');
        sendBtn.disabled = false;
        return;
      }
    } catch (e) { console.warn('[retrieve] failed:', e); }

    pendingSources = (config.project.showSourceCards !== false) ? retrieved.sources : null;

    const kbText = retrieved.chunks.length === 0 ? ''
      : retrieved.chunks.map((c, i) =>
          `[Source ${i + 1}: ${c.fileName || 'unnamed'}]\n${c.text}`
        ).join('\n\n');
    if (kbText) avatar.setKnowledgeBase(kbText);

    try { avatar.disconnect(); } catch (_) {}
    setTimeout(() => {
      avatar.connect();
      waitForConnected(() => {
        currentBotMsgEl = addMessage('bot', '');
        avatar.sendText(text);
        sendBtn.disabled = false;
        logTurn('user', text);
      });
    }, 150);
  }

  // ── 4. Streaming bot replies ────────────────────────────────
  let botBuffer = '';
  let botFlushTimer = null;
  function handleBotChunk(text) {
    const { clean, tags } = extractCaptureTags(text);
    if (tags.length) {
      for (const { key, value } of tags) sessionCapture[key] = value;
      scheduleSaveLead();
      updateCapturePanel();
    }

    if (!currentBotMsgEl) currentBotMsgEl = addMessage('bot', '');
    setMessageText(currentBotMsgEl, clean);
    botBuffer = clean;
    scrollToBottom();
    if (!panelOpen) bumpUnread();

    clearTimeout(botFlushTimer);
    botFlushTimer = setTimeout(() => {
      if (pendingSources && pendingSources.length && currentBotMsgEl) {
        attachSources(currentBotMsgEl, pendingSources);
        pendingSources = null;
      }
      if (botBuffer) logTurn('model', botBuffer);
      botBuffer = '';
      currentBotMsgEl = null;
    }, 1500);
  }

  let userFlushTimer = null;
  function handleUserChunk(text) {
    if (text === '__GREET_USER_NOW__') return;

    if (!currentUserMsgEl) {
      currentUserMsgEl = addMessage('user', '', { interim: true });
    }
    setMessageText(currentUserMsgEl, text);
    scrollToBottom();

    clearTimeout(userFlushTimer);
    userFlushTimer = setTimeout(() => {
      if (currentUserMsgEl) {
        currentUserMsgEl.classList.remove('interim');
        if (text && text !== lastUserFinal) {
          lastUserFinal = text;
          logTurn('user', text);
        }
        currentUserMsgEl = null;
      }
    }, 1200);
  }

  // ── 5. DOM helpers ──────────────────────────────────────────
  function addMessage(role, text, opts = {}) {
    const el = document.createElement('div');
    el.className = `msg ${role}`
      + (opts.welcome ? ' welcome' : '')
      + (opts.interim ? ' interim' : '');
    setMessageText(el, text);
    messagesEl.appendChild(el);
    requestAnimationFrame(() => el.classList.add('visible'));
    scrollToBottom();
    return el;
  }

  function setMessageText(el, text) {
    el.innerHTML = '';
    if (!text) return;
    const paragraphs = String(text).split(/\n{2,}/);
    for (const para of paragraphs) {
      const p = document.createElement('p');
      const lines = para.split('\n');
      lines.forEach((line, i) => {
        if (i > 0) p.appendChild(document.createElement('br'));
        appendInlineFormatted(p, line);
      });
      el.appendChild(p);
    }
  }

  function appendInlineFormatted(parent, text) {
    const urlRe = /(https?:\/\/[^\s<>"']+)/g;
    let lastIndex = 0;
    let m;
    while ((m = urlRe.exec(text)) !== null) {
      if (m.index > lastIndex) appendStyled(parent, text.slice(lastIndex, m.index));
      const a = document.createElement('a');
      a.href = m[0]; a.target = '_blank'; a.rel = 'noopener';
      a.textContent = m[0];
      parent.appendChild(a);
      lastIndex = m.index + m[0].length;
    }
    if (lastIndex < text.length) appendStyled(parent, text.slice(lastIndex));
  }

  function appendStyled(parent, text) {
    const re = /(\*\*[^*]+\*\*|\*[^*]+\*)/g;
    let last = 0, m;
    while ((m = re.exec(text)) !== null) {
      if (m.index > last) parent.appendChild(document.createTextNode(text.slice(last, m.index)));
      const tok = m[0];
      if (tok.startsWith('**')) {
        const b = document.createElement('strong'); b.textContent = tok.slice(2, -2); parent.appendChild(b);
      } else {
        const i = document.createElement('em'); i.textContent = tok.slice(1, -1); parent.appendChild(i);
      }
      last = m.index + tok.length;
    }
    if (last < text.length) parent.appendChild(document.createTextNode(text.slice(last)));
  }

  function attachSources(afterEl, sources) {
    if (!sources.length) return;
    const wrap = document.createElement('div');
    wrap.className = 'sources';
    for (const s of sources) {
      const card = document.createElement('div');
      card.className = 'source-card';
      if (s.previewUrl) {
        const img = document.createElement('img');
        img.className = 'src-thumb'; img.src = s.previewUrl; img.alt = s.fileName || '';
        card.appendChild(img);
      } else {
        const ic = document.createElement('div');
        ic.className = 'src-icon';
        ic.textContent = ({ pdf:'📄', docx:'📝', text:'📃', audio:'🔊', video:'🎬', image:'🖼️', url:'🔗' })[s.kind] || '📎';
        card.appendChild(ic);
      }
      const lbl = document.createElement('div');
      lbl.className = 'src-label';
      lbl.textContent = s.fileName || '';
      card.appendChild(lbl);
      wrap.appendChild(card);
    }
    afterEl.parentNode.insertBefore(wrap, afterEl.nextSibling);
  }

  function scrollToBottom() {
    requestAnimationFrame(() => {
      messagesEl.scrollTo({ top: messagesEl.scrollHeight, behavior: 'smooth' });
    });
  }

  function showFatal(msg) {
    document.body.innerHTML = `<div style="padding:24px;font-family:sans-serif;color:#444">⚠️ ${msg}</div>`;
  }

  // ── 6. Open/close + avatar canvas shuttling ──────────────────
  function openPanel() {
    panelOpen = true;
    root.dataset.state = 'open';
    unreadCount = 0;
    launcherBadge.hidden = true;

    // Move canvas from launcher to avatar stage
    if (avatarCanvas && !avatarCanvasSlot.contains(avatarCanvas)) {
      avatarCanvasSlot.appendChild(avatarCanvas);
      Object.assign(avatarCanvas.style, {
        width: '100%', height: '100%',
        borderRadius: '12px',
      });
    }

    notifyParent({ type: 'open' });
  }

  function closePanel(skipAnim) {
    panelOpen = false;
    root.dataset.state = skipAnim ? 'closed-instant' : 'closed';

    // Move canvas to launcher slot so it keeps animating there
    if (avatarCanvas && config && config.project.showAvatarInLauncher !== false) {
      if (!launcherAvatarSlot.contains(avatarCanvas)) {
        launcherAvatarSlot.appendChild(avatarCanvas);
        Object.assign(avatarCanvas.style, {
          width: '100%', height: '100%',
          borderRadius: '50%',
        });
      }
      launcherFallback.style.display = 'none';
    }

    notifyParent({ type: 'close' });
  }

  function bumpUnread() {
    unreadCount += 1;
    launcherBadge.textContent = String(Math.min(unreadCount, 99));
    launcherBadge.hidden = false;
  }

  launcher.addEventListener('click', openPanel);
  minimizeBtn.addEventListener('click', () => closePanel());

  function notifyParent(payload) {
    try { parent.postMessage({ source: 'avatar-platform', publicId, ...payload }, '*'); } catch (_) {}
  }

  // ── 7. Composer + input handling ─────────────────────────────
  textInput.addEventListener('input', () => {
    textInput.style.height = 'auto';
    textInput.style.height = Math.min(textInput.scrollHeight, 120) + 'px';
    if ((config?.project?.textDirection || 'auto') === 'auto') {
      const dir = detectDirection(textInput.value) || 'ltr';
      textInput.style.direction = dir;
      textInput.style.textAlign = dir === 'rtl' ? 'right' : 'left';
    }
  });
  textInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage(textInput.value);
    }
  });
  sendBtn.addEventListener('click', () => sendMessage(textInput.value));

  let micOn = false;
  micBtn.addEventListener('click', async () => {
    if (!avatar) return;
    if (!statusDot.classList.contains('connected')) {
      avatar.connect();
      waitForConnected(() => micBtn.click(), 50);
      return;
    }
    if (micOn) { avatar.stopMic(); micBtn.classList.remove('active'); micOn = false; }
    else       { await avatar.startMic(); micBtn.classList.add('active'); micOn = true; }
  });

  // ── 8. Logging ──────────────────────────────────────────────
  async function logTurn(role, text) {
    try {
      const res = await fetch(`/embed/${publicId}/log`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sessionId, role, text }),
      });
      if (res.ok) { const j = await res.json(); if (j.sessionId) sessionId = j.sessionId; }
    } catch (_) {}
  }

  // ── Commands from embed-loader.js ──────────────────────────────
  window.addEventListener('message', (e) => {
    if (!e.data || e.data.source !== 'avatar-platform-host') return;
    if (e.data.type === 'open' && !panelOpen) openPanel();
    if (e.data.type === 'drag-end') {
      const headerEl = document.getElementById('header');
      if (headerEl) headerEl.style.cursor = '';
    }
  });

  // ── Capture helpers ─────────────────────────────────────────
  function buildCaptureInstructions(fields) {
    if (!fields || fields.length === 0) return '';
    const fieldLines = fields.map(f =>
      `  - ${f.label} (key: ${f.key}, type: ${f.type}${f.required ? ', required' : ', optional'}${f.options ? ', options: ' + f.options.join('/') : ''})`
    ).join('\n');
    return `

LEAD CAPTURE INSTRUCTIONS: During this conversation, naturally collect the following details from the visitor. Weave the questions into the conversation — don't ask all at once. When you receive a value, output a tag on a new line in this exact format: [[CAPTURE:key=value]]
Do not mention the tag to the user — it will be stripped before display.

Fields to collect:
${fieldLines}

Always tag a value as soon as you receive it. If the visitor provides multiple values at once, emit one tag per line.`;
  }

  const CAPTURE_TAG_RE = /\[\[CAPTURE:([a-z][a-z0-9_]*)=([^\]]*)\]\]/g;

  function extractCaptureTags(text) {
    const tags = [];
    let clean = text.replace(CAPTURE_TAG_RE, (_, key, value) => {
      tags.push({ key, value: value.trim() });
      return '';
    });
    clean = clean.replace(/\n{3,}/g, '\n\n').trim();
    return { clean, tags };
  }

  function updateCapturePanel() {
    const keys = Object.keys(sessionCapture);
    if (keys.length === 0) return;

    const detailsPanel = document.getElementById('details-panel');
    const body  = document.getElementById('details-body');
    const pill  = document.getElementById('capture-pill');

    detailsPanel.style.display = 'block';

    const total    = captureFields.length;
    pill.style.display = 'inline';
    pill.textContent = total > 0 ? `${keys.length}/${total} captured` : `${keys.length} captured`;

    const fieldMap = Object.fromEntries(captureFields.map(f => [f.key, f.label]));
    body.innerHTML = keys.map(k => `
      <div style="display:flex;gap:8px;align-items:baseline">
        <span style="font-size:10px;opacity:.6;flex:0 0 90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escapeHtml(fieldMap[k] || k)}</span>
        <span style="font-size:12px;font-weight:500;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escapeHtml(sessionCapture[k])}</span>
      </div>`).join('');
  }

  let detailsOpen = true;
  function toggleDetailsPanel() {
    detailsOpen = !detailsOpen;
    document.getElementById('details-body').style.display = detailsOpen ? 'flex' : 'none';
    document.getElementById('details-chevron').textContent = detailsOpen ? '▲' : '▼';
  }

  function scheduleSaveLead() {
    if (captureFields.length === 0) return;
    clearTimeout(saveLeadTimer);
    saveLeadTimer = setTimeout(async () => {
      if (!sessionId || Object.keys(sessionCapture).length === 0) return;
      try {
        await fetch(`/embed/${publicId}/lead`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ sessionId, data: sessionCapture }),
        });
      } catch (_) {}
    }, 2000);
  }

  function escapeHtml(s) {
    return String(s || '').replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
  }

  boot();
  </script>
</body>
</html>
