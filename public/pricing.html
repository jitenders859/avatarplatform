<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Pricing — AvatarPlatform</title>
  <link rel="stylesheet" href="/css/app.css" />
</head>
<body>
  <nav class="topnav">
    <div class="topnav-inner">
      <a class="brand" href="/"><span class="brand-mark">A</span><span>AvatarPlatform</span></a>
      <div class="spacer"></div>
      <div class="nav-links">
        <a class="nav-link active" href="/pricing">Pricing</a>
        <a class="nav-link" href="/characters">Characters</a>
        <a class="nav-link" href="/login">Log in</a>
      </div>
      <a class="btn btn-primary btn-sm" href="/signup">Get started</a>
    </div>
  </nav>

  <div class="container mt-lg" style="text-align:center">
    <h1 style="font-size:36px;letter-spacing:-0.02em;margin:32px 0 8px">Pricing</h1>
    <p class="muted">Start free. No card required. Upgrade when you outgrow it.</p>
  </div>

  <div class="container mt-lg">
    <div class="grid grid-4" id="plans-grid"></div>
  </div>

  <script src="/js/api.js"></script>
  <script>
  async function load() {
    try {
      const { plans } = await API.plans();
      document.getElementById('plans-grid').innerHTML = plans.map(p => `
        <div class="card" style="position:relative;${p.popular ? 'border-color:var(--accent)' : ''}">
          ${p.popular ? '<span class="pill pill-info" style="position:absolute;top:-10px;left:20px">Most popular</span>' : ''}
          <h3 style="margin:0 0 4px;font-size:18px">${p.name}</h3>
          <div style="font-size:32px;font-weight:700;letter-spacing:-0.02em">$${p.priceMonthly}<span class="muted text-sm" style="font-weight:400">/mo</span></div>
          <p class="muted text-sm" style="margin:6px 0 16px">${p.description}</p>
          <ul style="list-style:none;padding:0;margin:0 0 20px;font-size:13px">
            ${p.features.map(f => `<li style="padding:4px 0">✓ ${f}</li>`).join('')}
          </ul>
          <a class="btn ${p.popular ? 'btn-primary' : 'btn-ghost'}" href="/signup" style="width:100%;justify-content:center">Get started</a>
        </div>
      `).join('');
    } catch (e) {
      document.getElementById('plans-grid').innerHTML = '<p class="muted">Could not load plans</p>';
    }
  }
  load();
  </script>
</body>
</html>
