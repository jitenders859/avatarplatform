<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Sign up — AvatarPlatform</title>
  <link rel="stylesheet" href="/css/app.css" />
</head>
<body>
  <div style="min-height:100vh;display:grid;place-items:center;padding:24px">
    <div class="card" style="width:100%;max-width:400px">
      <a class="brand" href="/" style="margin-bottom:24px;justify-content:center">
        <span class="brand-mark">A</span>
        <span>AvatarPlatform</span>
      </a>
      <h1 style="font-size:22px;margin:0 0 4px;text-align:center">Create your account</h1>
      <p class="muted text-sm text-center" style="margin:0 0 24px">Start with the free plan — no card required</p>

      <form id="signup-form" class="col gap-md">
        <div class="field">
          <label>Email</label>
          <input class="input" type="email" id="email" required autofocus autocomplete="email" />
        </div>
        <div class="field">
          <label>Password</label>
          <input class="input" type="password" id="password" required minlength="8" autocomplete="new-password" />
          <span class="help">At least 8 characters</span>
        </div>
        <div id="error" class="text-sm" style="color:#fca5a5;display:none"></div>
        <button class="btn btn-primary btn-lg" type="submit" id="submit">Create account</button>
      </form>

      <p class="muted text-sm text-center" style="margin-top:20px">
        Already have an account? <a href="/login">Log in</a>
      </p>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script>
  if (Auth.loggedIn()) location.href = '/dashboard';

  document.getElementById('signup-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submit');
    const err = document.getElementById('error');
    err.style.display = 'none';
    btn.disabled = true; btn.textContent = 'Creating…';
    try {
      const res = await API.signup(
        document.getElementById('email').value.trim(),
        document.getElementById('password').value,
      );
      Auth.token = res.token;
      Auth.user = res.user;
      location.href = '/dashboard';
    } catch (e2) {
      err.textContent = e2.message;
      err.style.display = 'block';
      btn.disabled = false; btn.textContent = 'Create account';
    }
  });
  </script>
</body>
</html>
