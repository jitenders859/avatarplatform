<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Set new password — AvatarPlatform</title>
  <link rel="stylesheet" href="/css/app.css" />
</head>
<body>
  <div style="min-height:100vh;display:grid;place-items:center;padding:24px">
    <div class="card" style="width:100%;max-width:400px">
      <a class="brand" href="/" style="margin-bottom:24px;justify-content:center">
        <span class="brand-mark">A</span>
        <span>AvatarPlatform</span>
      </a>
      <h1 style="font-size:22px;margin:0 0 4px;text-align:center">Set a new password</h1>
      <p class="muted text-sm text-center" style="margin:0 0 24px">Choose a new password for your account</p>

      <div id="invalid-msg" style="display:none;text-align:center">
        <div style="font-size:36px;margin-bottom:16px">⚠️</div>
        <p style="margin:0 0 8px;font-weight:600">Link invalid or expired</p>
        <p class="muted text-sm" style="margin:0 0 24px">Password reset links expire after 1 hour. Request a new one.</p>
        <a href="/forgot-password" class="btn btn-primary" style="width:100%;justify-content:center">Request new link</a>
      </div>

      <form id="reset-form" class="col gap-md">
        <div class="field">
          <label>New password</label>
          <input class="input" type="password" id="password" required autofocus autocomplete="new-password" />
          <span class="help">Minimum 8 characters.</span>
        </div>
        <div class="field">
          <label>Confirm new password</label>
          <input class="input" type="password" id="confirm" required autocomplete="new-password" />
        </div>
        <div id="error" class="text-sm" style="color:#fca5a5;display:none"></div>
        <button class="btn btn-primary btn-lg" type="submit" id="submit">Set new password</button>
      </form>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script>
  if (Auth.loggedIn()) location.href = '/dashboard';

  const token = new URLSearchParams(location.search).get('token');
  if (!token) {
    document.getElementById('reset-form').style.display = 'none';
    document.getElementById('invalid-msg').style.display = 'block';
  }

  document.getElementById('reset-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const pw  = document.getElementById('password').value;
    const con = document.getElementById('confirm').value;
    const err = document.getElementById('error');
    err.style.display = 'none';

    if (pw !== con) {
      err.textContent = 'Passwords do not match';
      err.style.display = 'block';
      return;
    }

    const btn = document.getElementById('submit');
    btn.disabled = true; btn.textContent = 'Saving…';
    try {
      await API.resetPassword(token, pw);
      // Short success message, then redirect to login
      btn.textContent = '✓ Password updated — redirecting…';
      setTimeout(() => location.href = '/login', 1500);
    } catch (e2) {
      if (e2.message.includes('invalid') || e2.message.includes('expired')) {
        document.getElementById('reset-form').style.display = 'none';
        document.getElementById('invalid-msg').style.display = 'block';
      } else {
        err.textContent = e2.message;
        err.style.display = 'block';
        btn.disabled = false; btn.textContent = 'Set new password';
      }
    }
  });
  </script>
</body>
</html>
